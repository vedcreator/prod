<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

              "on-tertiary-container": "#3c5966",
              "secondary-container": "#e2e2e4",
              "surface-container": "#ebeeef",
              "on-surface": "#2d3435",
              "secondary": "#5e5f61",
              "on-tertiary": "#f3faff",
              "surface-variant": "#dde4e5",
              "primary-fixed-dim": "#d6d4d3",
              "on-primary-container": "#525151",
              "inverse-primary": "#ffffff",

              "on-secondary-fixed": "#3e3f41",
              "surface-container-highest": "#dde4e5",
              "on-secondary-container": "#505254",
              "outline": "#757c7d",
              "on-error-container": "#752121",
              "on-error": "#fff7f6",
              "surface-bright": "#f9f9f9",
              "surface-container-low": "#f2f4f4",
              "on-primary-fixed": "#403f3f",
              "surface-dim": "#d4dbdd",
              "primary-dim": "#535252",
              "outline-variant": "#adb3b4",
              "on-tertiary-fixed-variant": "#466370",
              "primary-container": "#e5e2e1",

              "on-surface-variant": "#5a6061",

              "error-container": "#fe8983",

            fontFamily: {

              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9f9;
            color: #2d3435;
            font-family: 'Inter', sans-serif;
        }
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.75rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<nav class="w-full top-0 sticky z-40 bg-[#f9f9f9] dark:bg-[#0c0f0f]">
<div class="flex justify-between items-center px-11 py-6 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#5f5e5e] dark:text-[#faf7f6]" data-icon="calendar_today">calendar_today</span>
<h1 class="font-['Manrope'] font-bold tracking-tight text-2xl text-[#5f5e5e] dark:text-[#faf7f6]">3/5 Tasks</h1>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8 items-center">
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium text-[#5a6061] hover:text-[#5f5e5e] transition-colors cursor-pointer">Tasks</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium text-[#5a6061] hover:text-[#5f5e5e] transition-colors cursor-pointer">Plan</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium text-[#5f5e5e] font-bold cursor-default">Notes</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium text-[#5a6061] hover:text-[#5f5e5e] transition-colors cursor-pointer">Journal</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCYwj2tz_1eJv75iW1pfryzSNcCnJQpRvU2O_7Zd9G4nYwEnCKpj884X3VhMH0nqw-qyvWBp7OU-6ZDwMgoh1um_CmAccpUaxSyWey-xyH7DZz14QbW0ngUPqd-mxzFXTzhpj-JtmabG9Iot3jvXG-OzSV6fz9_Fgg4dKHCWVz4CDenY1RzgXiIjAQeFFjxlxqM3xz4yZWFwDH4qWD8xe_xEp7RfRY3XIQYcKkmZ9ptlAWYMvM_qxf9QJFrvBA8rg3LOpbYQTJYQOx"/>
</div>
</div>
</div>
</nav>
<main class="max-w-7xl mx-auto px-11 mt-12">
<!-- Header Section -->
<header class="mb-16">
<p class="font-label text-[0.75rem] uppercase tracking-[0.2em] text-on-surface-variant font-semibold mb-2">Workspace</p>
<h2 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-on-surface mb-6">Thoughts &amp; Drafts</h2>
<div class="w-24 h-1 bg-primary rounded-full"></div>
</header>
<!-- Notes Composer -->
<section class="mb-10 bg-surface-container-low rounded-xl p-6">
<label class="font-label text-[11px] uppercase tracking-widest text-on-surface-variant mb-3 block">Add Note</label>
<textarea class="w-full min-h-[120px] bg-surface-container-lowest border border-outline-variant/20 rounded-lg p-4 focus:ring-1 focus:ring-primary/20 resize-y" id="noteInput" placeholder="Write your note here..."></textarea>
<div class="mt-4 flex justify-end">
<button class="px-5 py-2 bg-primary text-on-primary rounded-md font-label text-xs uppercase tracking-widest font-bold hover:bg-primary-dim transition-colors" id="addNoteButton" type="button">Add Note</button>
</div>
</section>
<p class="text-sm text-on-surface-variant mb-4 hidden" id="notesEmptyState">No notes yet. Add your first note above.</p>
<section class="space-y-4" id="notesList"></section>
</main>
<!-- Floating Action Button -->
<button class="fixed bottom-24 right-8 md:bottom-12 md:right-12 w-16 h-16 bg-primary text-on-primary rounded-xl flex items-center justify-center shadow-[0_16px_48px_rgba(95,94,94,0.2)] hover:scale-105 transition-transform z-50">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#ffffff]/70 dark:bg-[#0c0f0f]/70 backdrop-blur-xl md:hidden">
<div class="flex flex-col items-center justify-center text-[#5a6061] dark:text-[#adb3b4] px-6 py-2 transition-all duration-400 hover:text-[#5f5e5e]">
<span class="material-symbols-outlined mb-1" data-icon="check_circle">check_circle</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">Tasks</span>
</div>
<div class="flex flex-col items-center justify-center text-[#5a6061] dark:text-[#adb3b4] px-6 py-2 transition-all duration-400 hover:text-[#5f5e5e]">
<span class="material-symbols-outlined mb-1" data-icon="event_upcoming">event_upcoming</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">Plan</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#e5e2e1] dark:bg-[#2d3435] text-[#5f5e5e] dark:text-[#faf7f6] rounded-lg px-6 py-2">
<span class="material-symbols-outlined mb-1" data-icon="description">description</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">Notes</span>
</div>
<div class="flex flex-col items-center justify-center text-[#5a6061] dark:text-[#adb3b4] px-6 py-2 transition-all duration-400 hover:text-[#5f5e5e]">
<span class="material-symbols-outlined mb-1" data-icon="auto_stories">auto_stories</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">Journal</span>
</div>
</nav>
<!-- Focus Tray (Extra Tooltip/Action Bar) -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 hidden md:flex items-center gap-6 px-8 py-3 glass-card rounded-full shadow-lg z-50">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<div class="w-px h-6 bg-outline-variant/20"></div>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
<script type="module" src="../shared/app-settings.js"></script>
<script type="module" src="../shared/navigation.js"></script>
<script type="module" src="../shared/firestore-task-header.js"></script>
<script type="module" src="../shared/firestore-notes.js"></script>
</body></html>
